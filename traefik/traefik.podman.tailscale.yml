# Traefik for rootless Podman + Tailscale trusted TLS (host HTTPS :8443).
# Requires: Tailscale admin → DNS → HTTPS certificates enabled.
# Traefik reads certs from host tailscaled via certificatesResolvers.harbour-tailscale.
log:
  level: INFO

api:
  dashboard: true
  insecure: false

certificatesResolvers:
  harbour-tailscale:
    tailscale: {}

entryPoints:
  web:
    address: ':80'
    http:
      redirections:
        entryPoint:
          to: ':8443'
          scheme: https
          permanent: true
  websecure:
    address: ':443'
    http:
      tls:
        certResolver: harbour-tailscale

providers:
  docker:
    endpoint: unix:///var/run/docker.sock
    exposedByDefault: false
    network: harbour-net
