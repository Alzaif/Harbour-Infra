# Traefik config for rootless Podman (host HTTPS port 8443, not 443).
log:
  level: INFO

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ':80'
    http:
      redirections:
        entryPoint:
          to: ':8443'
          scheme: https
          permanent: true
  websecure:
    address: ':443'

providers:
  docker:
    endpoint: unix:///var/run/docker.sock
    exposedByDefault: false
    network: harbour-net
